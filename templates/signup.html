<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — CyberGuard AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- ═══════════════════════════════
       NAVBAR (simplified)
  ═══════════════════════════════ -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="{{ url_for('home') }}" class="nav-logo">
        <svg class="nav-logo-icon" width="34" height="34" viewBox="0 0 32 32" fill="none">
          <path d="M16 2L3 8V17C3 24.7 8.9 31.9 16 34C23.1 31.9 29 24.7 29 17V8L16 2Z" fill="url(#sf1)"/>
          <path d="M16 2L3 8V17C3 24.7 8.9 31.9 16 34C23.1 31.9 29 24.7 29 17V8L16 2Z" stroke="#3B82F6" stroke-width="1.2" fill="none"/>
          <path d="M11 17L14.5 20.5L21 14" stroke="#06B6D4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="sf1" x1="3" y1="2" x2="29" y2="34" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1e3a5f"/>
              <stop offset="100%" stop-color="#0D1117"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="nav-logo-text">CyberGuard AI</span>
      </a>
      <div class="nav-actions">
        <a href="{{ url_for('home') }}" class="nav-link">Home</a>
        <a href="{{ url_for('signin') }}" class="nav-link">Sign In</a>
      </div>
    </div>
  </nav>

  <!-- ═══════════════════════════════
       AUTH WRAPPER
  ═══════════════════════════════ -->
  <div class="auth-wrapper">
    <div class="auth-panel">
      <div class="auth-logo" style="text-align: center; margin-bottom: 32px;">
        <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
          <path d="M16 2L3 8V17C3 24.7 8.9 31.9 16 34C23.1 31.9 29 24.7 29 17V8L16 2Z" fill="url(#sf2)"/>
          <path d="M16 2L3 8V17C3 24.7 8.9 31.9 16 34C23.1 31.9 29 24.7 29 17V8L16 2Z" stroke="#3B82F6" stroke-width="1.2" fill="none"/>
          <path d="M11 17L14.5 20.5L21 14" stroke="#06B6D4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="sf2" x1="3" y1="2" x2="29" y2="34" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1e3a5f"/>
              <stop offset="100%" stop-color="#0D1117"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Join thousands of users protecting themselves against cyber threats</p>

      <form id="authForm" class="auth-form">
        <div class="form-field">
          <label class="input-label">Email</label>
          <input type="email" name="email" class="tool-input" 
                 placeholder="you@example.com" required/>
        </div>

        <div class="form-field">
          <label class="input-label">Password</label>
          <input type="password" name="password" class="tool-input" 
                 placeholder="••••••••" required/>
        </div>

        <div class="form-field">
          <label class="input-label">Confirm Password</label>
          <input type="password" name="confirmPassword" class="tool-input" 
                 placeholder="••••••••" required/>
        </div>

        <div id="authError" class="form-error hidden"></div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; margin-top: 20px; font-size: 0.95rem;">
          Create Account
        </button>
      </form>

      <p class="form-note" style="margin-top: 24px;">
        Already have an account? <a href="{{ url_for('signin') }}">Sign in</a>
      </p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
    // Sign up form handler
    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button[type="submit"]');
      const errorEl = document.getElementById('authError');

      const email = form.email.value.trim().toLowerCase();
      const password = form.password.value;
      const confirmPassword = form.confirmPassword.value;

      errorEl.classList.add('hidden');

      // Validation
      if (password !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.remove('hidden');
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        // Mock: store in localStorage for demo
        const users = JSON.parse(localStorage.getItem('cg_users') || '[]');
        
        if (users.some(u => u.email === email)) {
          errorEl.textContent = 'This email is already registered.';
          errorEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Create Account';
          return;
        }

        const newUser = {
          id: Date.now(),
          email,
          password,
          createdAt: new Date().toISOString()
        };

        users.push(newUser);
        localStorage.setItem('cg_users', JSON.stringify(users));
        localStorage.setItem('cg_currentUser', JSON.stringify(newUser));

        // Show success message
        errorEl.style.color = 'var(--green)';
        errorEl.style.backgroundColor = 'rgba(34,197,94,0.08)';
        errorEl.style.borderColor = 'rgba(34,197,94,0.2)';
        errorEl.textContent = '✓ Account created successfully! Redirecting...';
        errorEl.classList.remove('hidden');

        // Redirect after 1.5 seconds
        setTimeout(() => {
          window.location.href = '{{ url_for("home") }}';
        }, 1500);

      } catch (err) {
        errorEl.textContent = 'An error occurred. Please try again.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
