<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - CyberGuard AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script
    defer
    crossorigin="anonymous"
    data-clerk-publishable-key="{{ clerk_publishable_key }}"
    src="{{ clerk_js_url }}"
    type="text/javascript">
  </script>
  <style>
    .google-auth-btn {
      width: 100%;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-weight: 700;
      font-size: 0.94rem;
      cursor: pointer;
      transition: transform var(--trans), background var(--trans), box-shadow var(--trans);
    }
    .google-auth-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 28px rgba(59,130,246,0.2);
    }
    .google-auth-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }
    .auth-status {
      min-height: 1.4em;
      margin-top: 18px;
      color: var(--text-muted);
      font-size: 0.84rem;
      text-align: center;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-inner">
<a href="{{ url_for('home') }}" class="nav-logo" style="gap:6px;">
  <img src="{{ url_for('static', filename='logo.cybergard.png') }}" alt="CyberGuard AI" height="36" style="object-fit:contain;">
  <span class="nav-logo-text">CyberGuard AI</span>
</a>

      <div class="nav-actions">
        <a href="{{ url_for('home') }}" class="nav-link">Home</a>
      </div>
    </div>
  </nav>

  <main class="auth-wrapper">
    <section class="auth-panel">
      <div style="text-align:center;margin-bottom:28px;">
        <h1 class="auth-title">Sign in</h1>
        <p class="auth-sub" style="margin-bottom:0;">Continue with your Google account.</p>
      </div>

      <button id="googleAuthBtn" class="google-auth-btn" type="button">
        <svg width="22" height="22" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.3l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.5-6 7l6.2 5.2C39.5 36.5 44 30.8 44 24c0-1.3-.1-2.7-.4-3.5z"/>
        </svg>
        Continue with Google
      </button>
      <div id="authStatus" class="auth-status">Secure authentication powered by Clerk</div>
    </section>
  </main>

  <script>
    function getClerkErrorMessage(err) {
      return err?.errors?.[0]?.longMessage
        || err?.errors?.[0]?.message
        || err?.message
        || "Google sign-in failed.";
    }

    window.addEventListener("load", async () => {
      const button = document.getElementById("googleAuthBtn");
      const status = document.getElementById("authStatus");

      try {
        await window.Clerk.load();
        if (window.Clerk.user) {
          window.location.href = "/";
          return;
        }

        button.addEventListener("click", async () => {
          button.disabled = true;
          status.textContent = "Opening Google...";

          try {
            const signIn = window.Clerk.client?.signIn;
            if (!signIn?.authenticateWithRedirect) {
              throw new Error("Clerk sign-in object is not ready. Refresh the page and try again.");
            }

            await signIn.authenticateWithRedirect({
              strategy: "oauth_google",
              redirectUrl: "/sso-callback",
              redirectUrlComplete: "/",
            });
          } catch (err) {
            console.error("Google sign-in failed:", err);
            status.textContent = getClerkErrorMessage(err);
            button.disabled = false;
          }
        });
      } catch (err) {
        console.error("Clerk failed to load:", err);
        status.textContent = "Clerk could not load. Check your key and internet connection.";
        button.disabled = true;
      }
    });
  </script>
</body>
</html>
